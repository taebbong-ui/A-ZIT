        .sub_elm {

        .ASCII {
            position: absolute;

        }
        .keyword-bar {
            position: absolute;
            width: 39.55vw;
            height: 4vh;
            top: 46.4%;
            left: 68%;
            transform: translate(-50%, -50%);

            align-items: center;

            font-size: 0.9vw;
            font-weight: 500;
            color: #7C797C;
            pointer-events: none;

        }
        /* 오르골 악보 */
        .music-wrap {
            position: absolute;
            width: 45.15vw;
            height: auto;
            top: 66.35%;
            left: 68.65%;
            transform: translate(-50%, -50%);
            aspect-ratio: 1000 / 520;

        }
        /* 바닥: 프레임 이미지 (래퍼 꽉 채우기) */
        .musicbox {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }
        .score-box {
            position: absolute;
            /* ⬇⬇ 오르골 박스 안쪽 흰 네모에 맞춰 미세 조정 */
            top: 10%;
            left: 3%;
            right: 3%;
            bottom: 5%;
            overflow: hidden; 
            display: grid;
            place-items: center;
        }
        /* <img>로 악보 넣을 때 */
        .score-box img,
        .score-box svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        
        .nickname {
            position: absolute;
            top: 14%;
            left: 12%;
            font-size: 3vw;
            font-family: 'GabiaNapjakBlock';
            color: #E6EDEA;
        }

        .content-card{
            position: absolute;
            left: 26.2%;
            top: 54%;
            transform: translate(-50%, -50%);
            width: 32.2vw;                /* ← 프레임 가로 */
            height: 67.8vh;               /* ← 프레임 세로 */
            box-sizing: border-box;
            /* overflow: hidden;            */
            /* border: 1px solid red;      */
        }

        /* ===== 슬라이드: 같은 자리에서 겹쳐놓고 한 장만 보이게 ===== */
        .content-item{
            position: absolute;
            inset: 0;                   /* 프레임에 딱 맞춤 */
            display: grid;              
            place-items: center;
            opacity: 0;
            pointer-events: none;       /* 안 보일 땐 클릭 막기 */
            transition: opacity .35s ease;
        }
        .content-item.active{
            opacity: 1;
            pointer-events: auto;
        }
        /* 이미지가 슬롯(프레임)을 꽉 채우도록 */
        .content-item > img{
            width: 100%;
            height: 100%;
            object-fit: contain;          /* 전부 보이려면 contain 으로 변경 */
            display: block;
        }
        /* === 추가: 화살표 버튼 === */
        .content-card .slide-btn{
            position: absolute;
            bottom: 2%;
            z-index: 2;                      /* 슬라이드 위에 올라오도록 */
            width: 2vw;                    /* 필요 시 숫자 조절 */
            height: 2.5vw;
            font-family: 'KakaoBigSans';
            font-size: 1.7vw;
            font-weight: thin;
            color: #E6EDEA;
            background: transparent;
            cursor: pointer;
            border: none;
            /* border: 1px solid red; */
        }
        /* 🔹 활성 버튼만 눌림 효과 적용 */
        .content-card .slide-btn:not(:disabled):active {
            transform: scale(1.1);
        }

        /* 🔹 비활성 버튼 스타일 */
        .content-card .slide-btn:disabled {
            cursor: default;          /* 클릭 커서 제거 */
            pointer-events: none;     /* 클릭 불가 (JS 이벤트 포함 완전 차단) */
        }
        .content-card .slide-btn.prev { left: 3vw; }
        .content-card .slide-btn.next { right: 3.5vw; }
        .content-card:focus,
        .content-card:focus-visible { outline: none; box-shadow: none; }

        /*답변 관련*/
        .content-card .answer { 
            position: absolute;
            z-index: 2;
            top: 18%;
            left: 13%;
            right: 13%;
            bottom: 10%;
            font-family: 'KakaoBigSans';
            font-size: 1vw;
            line-height: 1.4;
            color: #E6EDEA;
            white-space: pre-line;       /* \n 보존 */

            /* 🔥 추가 */
            overflow-y: auto;   /* 세로 스크롤 */
            overflow-x: hidden; /* 가로 스크롤은 숨김 (옵션) */
            padding-right: 0.5vw; /* 스크롤바 때문에 글 잘리는 것 방지 */
            /* 🔥 스크롤바 디자인 */
            scrollbar-width: thin;          /* Firefox */
            scrollbar-color: #ffffff33 transparent; /* Firefox */
        }

        .before-btn {
            position: absolute;
            width: 6.7vw;
            height: auto;
            top: 2.2%;                 
            left: 6.6%;                   
            transform: translateX(-50%);
        }
        .main-btn {
            position: absolute;
            width: 9.5vw;
            height: auto;
            bottom: 6%;                 
            left: 92%;

        .more {
            position: absolute;

            top: 9%;

        #download-btn {
            position: absolute;

            transition: transform 0.2s ease; /* 부드럽게 */
        }
        #download-btn:active {
            transform: translateX(-50%) scale(1.1);
        }

            q2: "사실은 재밌었어요. 다시 하고 싶고 다시 돌아가고 싶어요. 아무것도 모르던, 교실에서 친구를 기다리는 것만으로도 재밌어하던 그 시절로 돌아가고 싶어요. 그때만 할 수 있는 선택지일수도…",

 // ===== 1. 공통 DOM 캐시 & 함수들 =====
  const card    = document.getElementById('card');
  const slides  = Array.from(card.querySelectorAll('.content-item'));
  const prevBtn = card.querySelector('.slide-btn.prev');
  const nextBtn = card.querySelector('.slide-btn.next');
  const nicknameEl = document.getElementById('nickname');
  const scoreBox   = document.getElementById('scoreBox');
  const keywordBar = document.getElementById('keywordBar');
  const downloadBtn = document.getElementById('download-btn');

  let i = Math.max(0, slides.findIndex(el => el.classList.contains('active')));

  function clamp(n, min, max){ return Math.min(max, Math.max(min, n)); }

  function updateNav(){
    const atFirst = i === 0;
    const atLast  = i === slides.length - 1;

    prevBtn.disabled = atFirst;
    nextBtn.disabled = atLast;

    prevBtn.textContent = atFirst ? '◁' : '◀';
    nextBtn.textContent = atLast  ? '▷' : '▶';

    prevBtn.setAttribute('aria-disabled', String(atFirst));
    nextBtn.setAttribute('aria-disabled', String(atLast));
  }

  function show(n){
    i = clamp(n, 0, slides.length - 1);
    slides.forEach((el, idx) => el.classList.toggle('active', idx === i));
    updateNav();
  }

  prevBtn.addEventListener('click', () => { if (!prevBtn.disabled) show(i - 1); });
  nextBtn.addEventListener('click', () => { if (!nextBtn.disabled) show(i + 1); });
  card.tabIndex = 0;
  card.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft'  && !prevBtn.disabled) show(i - 1);
    if (e.key === 'ArrowRight' && !nextBtn.disabled) show(i + 1);
  });

  // 키워드 문자열 → 해시태그 span들
  function renderKeywords(tagStr){
    if (!keywordBar) return;
    const tokens = String(tagStr || '')
      .split(/[,，]/)
      .map(s => s.trim())
      .filter(Boolean)
      .map(s => s.replace(/^#/, ''))
      .slice(0, 6);

    keywordBar.innerHTML = tokens.map(t => `<span>#${t}</span>`).join(' ');
  }

  // 악보 이미지 렌더
  function renderScore(src){
    if (!scoreBox) return;
    scoreBox.replaceChildren();
    if (!src) return;
    const img = new Image();
    img.src = src;
    img.alt = '완성 악보';
    scoreBox.appendChild(img);
  }

  // 실제로 페이지에 내용을 넣는 함수(공통)
  function initDetail(entry){
    if (!entry) {
      alert('entry 없음');
      return;
    }

    // 닉네임
    nicknameEl.textContent = entry.nickname || '';

    // 답변
    card.querySelector('.a0').textContent = entry.q0 || '';
    card.querySelector('.a1').textContent = entry.q1 || '';
    card.querySelector('.a2').textContent = entry.q2 || '';

    // 악보
    renderScore(entry.musicSrc);

    // 키워드
    renderKeywords(entry.tag);

    // 슬라이드 내비 초기화
    show(i);

    // 다운로드 버튼 세팅
    setupDownload(entry);
  }

  function saveBlobAs(blob, filename = 'score.svg') {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function setupDownload(entry){
  downloadBtn.style.cursor = 'pointer';
  downloadBtn.setAttribute('role', 'button');
  downloadBtn.setAttribute('aria-label', '오르골 악보 내려받기'); 
  downloadBtn.tabIndex = 0;

  downloadBtn.onclick = () => {
    console.log('Download started');

    const nickname = (entry.nickname || 'Unknown').replace(/\s+/g, '');
    const filename = `AZIT_${nickname}_오르골 악보.svg`;

    // musicSrc가 없는 경우
    if (!entry.musicSrc) {
      console.warn('musicSrc 없음 → 다운로드 불가');
      return;
    }

    const src = entry.musicSrc;

    // pre-signed URL (http/https) → 그냥 그리로 이동
    if (/^https?:\/\//.test(src)) {
      window.location.href = src;
      return;
    }

    // mock용 로컬 파일 (element/...) → 강제 다운로드 시도
    const a = document.createElement('a');
    a.href = src;
    a.download = filename; // 여기서 네가 원하는 이름으로 저장
    document.body.appendChild(a);
    a.click();
    a.remove();

    console.log('Download finished (from local mock file)');
  };
}

  // ===== 2. URL 파라미터 해석 =====
  const params = new URLSearchParams(location.search);
  const idFromMock  = params.get("id");      // 첫 줄(프론트 mock 용)
  const songIdParam = params.get("songId");  // 둘째 줄 이후(Firebase 용)

  // --- 2-1. 첫 줄: mockEntries에서만 찾기 ---
  if (idFromMock && !songIdParam) {
    const entry = mockEntries.find(e => String(e.id) === String(idFromMock));
    if (!entry) {
      alert("mockEntries에서 해당 id를 찾지 못했어요");
      return;
    }
    initDetail(entry);   // ✅ 첫 줄은 무조건 여기서 끝
    return;
  }

    // --- 2-2. 둘째 줄 이후: Firebase + 백엔드에서 가져오기 ---
  if (!songIdParam) {
    alert("songId가 없습니다");
    return;
  }

  const db = firebase.firestore();
  const songIdNum = Number(songIdParam);
  const BASE_URL = 'https://azit2025.duckdns.org';

  (async () => {
    try {
      // 1) Firebase archiveNotes에서 songId에 해당하는 노트 정보(닉네임, 태그) 가져오기
      let nicknameFromNote = '';
      let tagFromNote = '';

      const noteSnap = await db.collection('archiveNotes')
        .where('songId', '==', songIdNum)
        .limit(1)
        .get();

      if (!noteSnap.empty) {
        const note = noteSnap.docs[0].data(); // { songId, nickname, tag, ... }
        nicknameFromNote = note.nickname || '';
        tagFromNote = note.tag || '';
      }

      // 2) 백엔드 /achive/{songId}에서 상세 정보 가져오기
      const resp = await fetch(`${BASE_URL}/archive/${encodeURIComponent(songIdNum)}`, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      });

      if (!resp.ok) {
        console.error('❌ /archive/{songId} 응답 에러', resp.status);
        alert('상세 데이터를 불러오는 데 실패했어요');
        return;
      }

      const raw = await resp.json();
      console.log('archive raw response =', raw);
      const detail = raw.data ?? raw;  // data가 있으면 data, 없으면 raw 그대로 사용
    
      // detail 예시:
      // {
      //   "songId": 1,
      //   "user": { "userId": 1, "nickName": "SunnyKid" },
      //   "memory": { "answer1": "...", "answer2": "...", "answer3": "..." },
      //   "svgUrl": "https://..."
      // }

      const entry = {
        id: detail.songId,
        nickname: nicknameFromNote || (detail.user && detail.user.nickName) || '',
        tag: tagFromNote,   // Firebase 태그 우선 사용
        q0: detail.memory?.answer1 || '',
        q1: detail.memory?.answer2 || '',
        q2: detail.memory?.answer3 || '',
        musicSrc: detail.svgUrl
      };

      initDetail(entry);   // ✅ 이걸로 화면에 채우기
    } catch (err) {
      console.error(err);
      alert('데이터 로딩 중 오류가 발생했습니다');
    }
  })();
})();
