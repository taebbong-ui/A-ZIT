    <script type="module">
        // ===== 아카이브 노트 실시간 추가용 Firestore 설정 =====
        const db = firebase.firestore();
        const notesRef = db.collection('archiveNotes');
        const MAX_PER_LINE = 8;

        // line 안에서 x 위치 계산 (archive.html과 동일)
        function calcX(order) {
            const margin = 8;                        // 좌우 여백 %
            const usable = 100 - margin * 2;
            const slot = usable / (MAX_PER_LINE - 1);
            const jitterRatio = 0.15;
            const jitterRange = slot * jitterRatio;

            const center = margin + slot * order;
            const jitter = (Math.random() * 2 - 1) * jitterRange;
            const x = Math.min(100 - margin, Math.max(margin, center + jitter));

            return x + '%';
        }

        // y 위치는 약간 랜덤
        function calcY() {
            const min = 17;   // 최소 17%
            const max = 90;   // 최대 90%
            const y = min + Math.random() * (max - min);
            return y + '%'; 
        }

        // qa_4에서 새로 생성된 songId를 archiveNotes에 추가
        async function addSharedNote(entry) {
            // entry: { songId, nickname, tag }

            // 1) 현재까지 저장된 공유 노트 개수
            const snap  = await notesRef.get();
            const total = snap.size;  // 0,1,2,...

            // 2) 줄/칸 계산
            const lineIndex = Math.floor(total / MAX_PER_LINE); // 0,1,2...
            const order     = total % MAX_PER_LINE;             // 0~7

            // 3) 위치 계산
            const x = calcX(order);
            const y = calcY();

            // 4) 노트 모양 인덱스 (NOTE_SVGS는 archive.html에만 있으니 개수 8개 기준)
            const svgIndex = Math.floor(Math.random() * 8); // 0~7

            // 5) Firestore에 저장
            await notesRef.add({
                songId:   entry.songId,
                nickname: entry.nickname,
                tag:      entry.tag,
                lineIndex,
                x,
                y,
                svgIndex,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }


        import { createMemory, analyzeMemory, generateMusic } from './api.js';
        const nextBtn    = document.getElementById('nextBtn');
        const alertModal = document.getElementById('alertModal');
        const alertText  = document.getElementById('alertText');
        const closeAlert = document.getElementById('closeAlert');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const openAlert  = (msg) => { alertText.innerHTML = msg; alertModal.style.display = 'flex'; };
        closeAlert?.addEventListener('click', () => alertModal.style.display = 'none');
        alertModal?.addEventListener('click', (e) => { if (e.target === alertModal) alertModal.style.display = 'none'; });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') alertModal.style.display = 'none'; });



        // 이 페이지에 '무언가라도' 입력했는지(현재 DOM 기준)
        function hasAnyInput() {
            return Array.from(document.querySelectorAll('textarea, input[type="text"], input[type="email"], input[type="number"]'))
                .some(el => (el.value || '').trim().length > 0);
        }

        // 값 수집: DOM(현재 타자값) → FormState → localStorage 순서
        function pickAnswer(field, domSelectors, lsKeys) {
            // 1) DOM에서 먼저 시도 (현재 페이지에 있으면 최신값)
            for (const sel of domSelectors) {
                const el = document.querySelector(sel);
                if (el && typeof el.value === 'string') {
                    const v = el.value.trim();
                    if (v) return v;
                }
            }
            // 2) FormState에서 시도 (자동 저장된 값)
            if (window.FormState?.getState) {
                const st = FormState.getState() || {};
                if (st[field] && String(st[field]).trim() !== '') return String(st[field]).trim();
            }
            // 3) localStorage 백업 키에서 시도
            for (const k of lsKeys) {
                const v = (localStorage.getItem(k) || '').trim();
                if (v) return v;
            }
            return '';
        }

        nextBtn.addEventListener('click', async (e) => {
            e.preventDefault(); // 내가 제어

            // 1) 검증: 이 페이지에서 아무것도 안 적었으면 막기(원하면 제거 가능)
            if (!hasAnyInput()) {
                openAlert('내용을 입력해주세요.');
                return;
            }

            // userId는 qa_1에서 저장해둔 값 사용 (FormState 우선, 없으면 localStorage)
            const st     = window.FormState?.getState ? (FormState.getState() || {}) : {};
            const userId = st.userId || localStorage.getItem('userId');
            if (!userId) {
                openAlert('사용자 정보가 없습니다. 처음부터 다시 진행해 주세요.');
                return;
            }
            // answer1~3 수집
            // id 패턴: #answer_q1|2|3  / data-field: q1|q2|q3
            const answer1 = pickAnswer('q1', ['#answer_q1', '[data-field="q1"]'], ['answer1','q1']);
            const answer2 = pickAnswer('q2', ['#answer_q2', '[data-field="q2"]'], ['answer2','q2']);
            const answer3 = pickAnswer('q3', ['#answer_q3', '[data-field="q3"]'], ['answer3','q3']);

            // (선택) 세 문항 모두 비어있으면 막기
            if (!answer1 && !answer2 && !answer3) {
                openAlert('답변을 입력해주세요.');
                return;
            }
            // 🔒 버튼 잠그고 로딩 ON
            nextBtn.style.pointerEvents = 'none';
            nextBtn.setAttribute('aria-disabled', 'true');
            if (loadingOverlay) loadingOverlay.style.display = 'flex';

            try {
  nextBtn.style.pointerEvents = 'none';
  nextBtn.setAttribute('aria-disabled', 'true');

  const st = window.FormState?.getState ? (FormState.getState() || {}) : {};
  const userId = st.userId || localStorage.getItem('userId');
  if (!userId) throw new Error('userId missing in qa_4');

  // 1) 🧩 memory 저장
  const memResp = await createMemory(userId, { answer1, answer2, answer3 });
  console.log('createMemory resp (raw):', memResp);

  const memBody = memResp?.data ?? memResp;
  const memoryId = memBody?.memoryId ?? memBody?.id;
  if (!memoryId) {
    console.error('memoryId not found in response:', memResp);
    throw new Error('memoryId missing');
  }

  // 2) 🎧 memory 분석 → elementId, keywords 등
  const analyzeResp = await analyzeMemory({ userId, memoryId });
  console.log('analyzeMemory resp (raw):', analyzeResp);

  const analyzeBody = analyzeResp?.data ?? analyzeResp;
  const elementId   = analyzeBody?.elementId;
  const keywords    = Array.isArray(analyzeBody?.keywords)
                        ? analyzeBody.keywords
                        : [];

  if (!elementId) {
    console.error('elementId not found in analyze response:', analyzeResp);
    throw new Error('elementId missing');
  }

  // 3) 🎵 뮤직젠 → songId, midiUrl/wavUrl/svgUrl
  const musicResp = await generateMusic({ elementId });
  console.log('generateMusic resp (raw):', musicResp);

  const musicBody = musicResp?.data ?? musicResp;
  const songId    = musicBody?.songId;
  const svgUrl    = musicBody?.svgUrl || '';

  if (!songId) {
    console.error('songId not found in music response:', musicResp);
    throw new Error('songId missing');
  }

  // 4) 📌 아카이브 노트에 저장할 닉네임/태그 준비
  const nickname =
    musicBody.user?.nickName ||
    memBody.user?.nickName ||
    st.name ||
    st.nickName ||
    localStorage.getItem('userName') ||
    '이름 없음';

  const tag = keywords.length ? keywords.join(', ') : '';

  // Firebase 오선지 노트에 추가 (이미 만들어 둔 함수라고 가정)
  try {
    await addSharedNote({ songId, nickname, tag });
  } catch (e) {
    console.error('archiveNotes 추가 실패(화면 진행은 계속):', e);
  }

  // 5) 🔄 다음 사용자 위해 폼/유저 정보 초기화
  if (window.FormState?.clear) {
    FormState.clear();
  }
  
  // qa.js 안 쓰는 경우 대비: 개별 키들 제거
  localStorage.removeItem('qaForm:v1');  // 통합 폼 상태 썼다면
  localStorage.removeItem('userId');
  localStorage.removeItem('userName');
  localStorage.removeItem('userEmail');
  localStorage.removeItem('answer1');
  localStorage.removeItem('answer2');
  localStorage.removeItem('answer3');

  // 6) ✨ 완성된 곡의 songId 로 디테일 페이지 이동
  location.href = `archive_detail.html?songId=${encodeURIComponent(songId)}`;

} catch (err) {
  console.error(err);
  openAlert('전송 중 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
  nextBtn.style.pointerEvents = 'auto';
  nextBtn.removeAttribute('aria-disabled');
}
});
