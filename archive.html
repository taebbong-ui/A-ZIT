<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Main</title>
    <style>
      @font-face {
            font-family: 'KakaoBigSans';
            src: url('element/archive_detail/fonts/kakao-big-sans/KakaoBigSans-Regular.ttf') format('opentype');
            font-style: normal;
      }
      @font-face {
            font-family: 'GabiaNapjakBlock';
            src: url('element/archive_detail/fonts/GabiaNapjakBlock/gabia_napjakBlock.otf') format('opentype'),
                 url('element/archive_detail/fonts/GabiaNapjakBlock/gabia_napjakBlock.ttf') format('truetype');
            font-style: normal;
      }
      :root { --note-size: 2.1vw; }
      /* 페이지 기본 */
      body{ margin:0; overflow-x:hidden; }

      /* 1) 히어로: 배경 프레임(부모) */
      .hero{
        position: relative;
        width: 100vw;
        height:auto;
        /* 원본 비율 고정 (원본 캔버스 비율에 맞춰 추천) */
        aspect-ratio: 1920 / 1233; 
        overflow: hidden;
      }
      /* 레퍼런스 오버레이 (레이아웃 차지 X) */
      /* .ref{
        position:absolute; inset:0;         
        width:100%; height:100%;
        object-fit:cover;
        opacity:.35;                         
        pointer-events:none;                  
        z-index:3;                           
      } */

      /* 배경 이미지: 부모 크기에 맞게 */
      .hero-bg{
        position:absolute; inset:0;
        width:100%; height:100%;
        object-fit: cover;
        z-index: 0;
        pointer-events:none;
      } 

      /* 장식물: 모두 hero 내부에서 절대배치 */
      .logo{
        position:absolute; z-index: 2; pointer-events:none;
        width: 82.2vw;      /* 너비는 vw로 */
        left: 46.35%; top: 11%; transform: translate(-50%, -50%);
      }
      .text{
        position:absolute; z-index: 2; pointer-events:none;
        width: 20.7vw;
        left: 22.35%; top: 16.55%; transform: translate(-50%, -50%);
      }
      .hero .staff-img {
        position:absolute; z-index: 1; pointer-events:none;
        width: 100vw; left:50%; transform: translateX(-50%);
      }
      .hero .staff1{ top: 20.9%; }  /* 백그라운드 기준 % → hero 높이에만 의존 */
      .hero .staff2{ top: 60.5%; }  /* 원하는 위치로 조정 */
    
      /* 1·2번째 줄: 오선지 보드 (노트 올리는 레이어) */
      .hero .staff-board {
        position:absolute;
        left:50%; transform:translateX(-50%);
        width:83%;
        height:calc(200 / 1233 * 100%);
        z-index:2; /* 노트가 오선지 위로 올라오게 */
      }
      #staff-1 { top:32%; }
      #staff-2 { top:71.8%; }

      /* 3줄 이후 붙일 영역(선택) */
      /* .staff-stack{ position:relative; padding-bottom:80px; } */

      /* 노트 + 툴팁 */
      .note{
        position:absolute; transform:translate(-50%,-50%);
        cursor:pointer;                   /* 클릭 가능 */
        z-index: 3;
      }
      /* ✅ 이거 반드시 추가! (그리고 .note 뒤쪽에 와야 함) */
      .note:hover{
        z-index: 10;  /* 이 노트 + 그 안의 tip 통째로 맨 위 */
      }
      .note-icon{ width:var(--note-size); height:auto; display:block; pointer-events:none; }

      .note .tip{
        position:absolute; left:50%; bottom:140%; transform:translateX(-50%);
        width:9vw; padding: 0vw 1vw;
        background:#fff; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.18);
        font-size:1.1vw; color:#333;
        opacity:0; pointer-events:none; transition:.15s ease; white-space:normal;
      }
      .note:hover .tip{ opacity:1; }
      /* 이름 스타일 */
      .note .tip-name {
        font-family: 'GabiaNapjakBlock';
        font-size:1.2vw;
        color:#111;
        margin-top: 1vw;    
        margin-bottom: 1vw;     
        /* border: 1px solid red; */
      }

      /* 태그 스타일 */
      .note .tip-tags {
        font-family: 'KakaoBigSans';
        font-size:0.9vw;
        color:#111;
        line-height:1.3;
        margin-bottom: 1vw;
        /* border: 1px solid red; */
      }
      #staff-stack {
        width: 100vw;
        margin-top: -1.5px;   /* 살짝 겹치게 붙여서 줄 사라지게 */
      }

      .staff-line-wrapper {
        position: relative;
        width: 100vw;
        margin-top: 0;   /* 줄 간격 */
        display: block;
        padding: 0;       /* 여백 0 */
        margin-top: -1.5px;  /* 스택 안에서 줄이 여러 개 생길 때도 흰 선 방지 */
      }

      .staff-line-wrapper .staff-img {
        display: block;
        width: 100vw;
        height: auto;
        margin: 0;
        padding: 0;
      }

      .staff-line-wrapper .staff-board {
        position: absolute;
        inset: 0;       /* 오선지 위를 그대로 덮음 */
        left:50%; transform:translateX(-50%);
        width: 83%;
        height: 43%;
        top: 27.5%;
        margin: 0;
        padding: 0;
      }
      .main-btn {
        position: fixed;
        width: 9.5vw;
        height: auto;
        bottom: 6%;                 
        left: 92%;                   
        transform: translateX(-50%);
        z-index: 10;
      }    
      .main-btn:hover {
          transform: translateX(-50%) scale(1.05);
      }
    
    </style>

    // ===== 설정 =====
    const MAX_PER_LINE = 8;
    const DETAIL_PAGE = 'archive_detail.html';

    const STAFF_SVGS = [
      'element/archive/ㅇㅋㅇㅂ_1st.svg',
      'element/archive/ㅇㅋㅇㅂ_2nd.svg',
      'element/archive/ㅇㅋㅇㅂ_3rd.svg',
      'element/archive/ㅇㅋㅇㅂ_4th.svg'
    ];

    const NOTE_SVGS = [
      'element/archive/노트1.svg',
      'element/archive/노트2.svg',
      'element/archive/노트3.svg',
      'element/archive/노트4.svg',
      'element/archive/노트5.svg',
      'element/archive/노트6.svg',
      'element/archive/노트7.svg',
      'element/archive/노트8.svg'
    ];

    // Firebase 핸들(지금은 레이아웃용으론 안 쓰고, 테스트용 ping만)
    const db = firebase.firestore();

    // ================= 공통 유틸 =================

    // order: 0~7 (줄 안에서 몇 번째 칸인지)
    function calcX(order) {
      const margin = 8;                        // 좌우 여백 %
      const usable = 100 - margin * 2;
      const slot = usable / (MAX_PER_LINE - 1);
      const jitterRatio = 0.15;
      const jitterRange = slot * jitterRatio;

      const center = margin + slot * order;
      const jitter = (Math.random() * 2 - 1) * jitterRange;
      const x = Math.min(100 - margin, Math.max(margin, center + jitter));

      return x + '%';
    }

    // 오선지 세로 안에서 랜덤 Y
    function calcY() {
      const min = 17;   // 최소 17%
      const max = 90;   // 최대 90%
      const y = min + Math.random() * (max - min);
      return y + '%'; 
    }

    // lineIndex 기준으로 어떤 오선지 이미지를 쓸지
    function getStaffSrcFor(lineIndex) {
      // lineIndex 0 = 이미 hero 안의 2nd 줄 (#staff-2)
      // lineIndex 1 → 3rd, 2 → 4th, 3 → 1st, 4 → 2nd ...
      const startIdx = 2; // STAFF_SVGS[2] = 3rd.svg
      const offset = lineIndex - 1;  // 1번째 추가줄(lineIndex=1)은 +0
      const idx = (startIdx + offset) % STAFF_SVGS.length;
      return STAFF_SVGS[idx];
    }

    // lineIndex에 맞는 board DOM 얻기 (없으면 생성)
    function getBoardForLineIndex(lineIndex) {
      // lineIndex 0 = 2번째 줄 → #staff-2
      if (lineIndex === 0) {
        return document.getElementById('staff-2');
      }

      const stack = document.getElementById('staff-stack');
      const selector = `.staff-board[data-line-index="${lineIndex}"]`;
      let board = stack.querySelector(selector);

      if (!board) {
        // 새 줄 wrapper 생성 → 화면 맨 아래에 추가됨
        const wrapper = document.createElement('div');
        wrapper.className = 'staff-line-wrapper';

        // lineIndex에 맞는 오선지 svg 선택
        const staffImg = document.createElement('img');
        staffImg.className = 'staff staff-img';
        staffImg.src = getStaffSrcFor(lineIndex);
        wrapper.appendChild(staffImg);

        // 이 줄 위에 노트 깔릴 보드
        board = document.createElement('div');
        board.className = 'staff staff-board';
        board.dataset.lineIndex = String(lineIndex);
        wrapper.appendChild(board);

        stack.appendChild(wrapper);
      }
      return board;
    }

    function toHashTags(tagStr) {
      return tagStr
        .split(',')
        .map(t => t.trim())
        .filter(Boolean)
        .map(t => `#${t}`)
        .join(' ');
    }

    // 실제 DOM 노트 하나 생성
    function createNote(pos, entry, svgIndex) {
      const wrap = document.createElement('div');
      wrap.className = 'note';
      wrap.style.left = pos.x;
      wrap.style.top  = pos.y;

      // svgIndex 넘어오면 그대로, 없으면 랜덤
      let idx;
      if (typeof svgIndex === 'number') {
        idx = svgIndex;
      } else {
        idx = Math.floor(Math.random() * NOTE_SVGS.length);
      }

      const img = document.createElement('img');
      img.className = 'note-icon';
      img.src = NOTE_SVGS[idx];

      const tip = document.createElement('div');
      tip.className = 'tip';
      tip.innerHTML = `
        <div class="tip-name">${entry.nickname}</div>
        <div class="tip-tags">${toHashTags(entry.tag)}</div>
      `;

      const go = () => {
        if (!entry.id) return;
        const url = `${DETAIL_PAGE}?id=${encodeURIComponent(entry.id)}`;
        window.location.href = url;
      };

      wrap.addEventListener('click', go);
      wrap.addEventListener('keydown', (e)=>{ 
        if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } 
      });

      wrap.appendChild(img);
      wrap.appendChild(tip);
      return wrap;
    }

    // ===== 1번째 줄: mockEntries 앞 8개를 고정 위치에 배치 =====
    (function renderFirstLine(){
      const line1 = document.getElementById('staff-1');
      if (!line1 || !window.mockEntries) return;

      const data = window.mockEntries.slice(0, MAX_PER_LINE);
      const fixedPositions = [
        { x: '8%',  y: '70%' },
        { x: '20%', y: '35%' },
        { x: '34%', y: '53%' },
        { x: '46%', y: '54%' },
        { x: '58%', y: '34%' },
        { x: '70%', y: '90%' },
        { x: '82%', y: '70%' },
        { x: '92%', y: '17%' },
      ];

      const fixedSvgIndex = [0,1,2,3,4,5,6,7];

      data.forEach((entry, i) => {
        const pos = fixedPositions[i % fixedPositions.length];
        const svgIdx = fixedSvgIndex[i];
        line1.appendChild(createNote(pos, entry, svgIdx));
      });
    })();

    // ===== 2번째 줄 이후: mockEntries 나머지를 이용해 아래로 쌓기 =====
    function renderMoreLinesFromMock() {
      if (!window.mockEntries) return;

      // 첫 줄(8개) 이후부터 사용
      const extra = window.mockEntries.slice(MAX_PER_LINE);
      if (extra.length === 0) return;

      extra.forEach((entry, idx) => {
        const total = idx;                          // 0부터 시작
        const lineIndex = Math.floor(total / MAX_PER_LINE);  // 0,1,2,...
        const order     = total % MAX_PER_LINE;              // 0~7

        const board = getBoardForLineIndex(lineIndex);
        if (!board) return;

        const pos = { x: calcX(order), y: calcY() };
        const svgIndex = Math.floor(Math.random() * NOTE_SVGS.length);

        const noteEl = createNote(pos, entry, svgIndex);
        board.appendChild(noteEl);
      });
    }

    // 페이지 로드 시 mockEntries로만 전체 렌더
    renderMoreLinesFromMock();

    // Firebase는 archiveNotes_test에 ping만 날려서 연결 확인용으로 사용
    db.collection('archiveNotes_test').doc('ping').set({ ok: true }).then(() => {
      console.log('🔥 Firebase 연결 OK (archiveNotes_test)');
    }).catch(err => {
      console.error('Firebase ping 실패', err);
    });
  </script>
